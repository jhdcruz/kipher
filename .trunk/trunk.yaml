version: 0.1
cli:
    version: 1.22.6

plugins:
    sources:
        - id: trunk
          ref: v1.6.4
          uri: https://github.com/trunk-io/plugins
lint:
    disabled:
        - markdownlint
        - prettier
        - shellcheck
    enabled:
        - checkov@3.2.267
        - trivy@0.56.2
        - trufflehog@3.82.11
        - renovate@38.127.0
        - yamllint@1.35.1
        - shfmt@3.6.0
        - gitleaks@8.21.0
        - taplo@0.9.3
        - ktlint@1.3.1
        - git-diff-check
        - actionlint@1.7.3
        - detekt-gradle@SYSTEM
    ignore:
        - linters: [ ALL ]
          paths:
            - gradlew
            - gradlew.bat
runtimes:
    enabled:
        - python@3.10.8
        - go@1.21.0
        - java@17.0.6
        - node@18.13.0
actions:
    enabled:
        - trunk-announce
        - trunk-check-pre-push
        - trunk-fmt-pre-commit
        - trunk-upgrade-available
