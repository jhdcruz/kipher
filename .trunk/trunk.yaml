version: 0.1
cli:
    version: 1.22.2

plugins:
    sources:
        - id: trunk
          ref: v1.6.0
          uri: https://github.com/trunk-io/plugins
lint:
    disabled:
        - markdownlint
        - prettier
        - shellcheck
    enabled:
        - checkov@3.2.156
        - trivy@0.52.2
        - trufflehog@3.79.0
        - renovate@37.420.1
        - yamllint@1.35.1
        - shfmt@3.6.0
        - gitleaks@8.18.4
        - taplo@0.8.1
        - ktlint@1.3.0
        - git-diff-check
        - actionlint@1.7.1
        - detekt-gradle@SYSTEM
    ignore:
        - linters: [ ALL ]
          paths:
            - gradlew
            - gradlew.bat
runtimes:
    enabled:
        - python@3.10.8
        - go@1.21.0
        - java@17.0.6
        - node@18.13.0
actions:
    enabled:
        - trunk-announce
        - trunk-check-pre-push
        - trunk-fmt-pre-commit
        - trunk-upgrade-available
